apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: aerostream
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aerostream-api
  template:
    metadata:
      labels:
        app: aerostream-api
    spec:
      containers:
        - name: api
          image: aerostream-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"